body:
  text: 乾元子三始論至真子龍虎大丹詩乾元子三始論太易天地者起於太易太易者不可見也從地而生故曰陽在下也質形未辨玄黃雜居故曰龍德而隱者也謂氣從下而生故動於地之下則應天之上乃從無而生其有且天地之精受乎天者發作動用而歸於乾天氣上騰為雲為氣受乎地者發作動用而歸於坤地氣下降為霧為露守之者則大業盛矣昌矣太初太初者氣之始也從坎而生故易變而為一一者陽之始也天地之元氣也歷九州而終於乾乾者健也始於坎而成一徽故曰初九爻生潤物濟衆氣用無窮終而復始故謂之長生也哉太始太始者形之始也名之曰器一變而為七七者南方火位也隂陽交泰萬物長養矣左化為離以象其日后化為坎以象其月日為天而左旋月為地而右轉二氣其濟交成太素而成二徵故曰九二爻生至之太極太極至二儀而生八卦八卦曰法象法象莫大乎天地天地著明莫大乎日月日月運行久而通變通變之道其可得而究哉太素太素者質之始氣也形質具名曰大象而未相離故曰混沌涵不散也萬物莫不因此三始而煦育焉而成三徵故曰九三爻生也乾既具質坤之生焉而法六五則隂氣生故謂之日月如合璧存而勿忘機乎故春秋節令有度悔吝不生是以外圓而靑氣周乎六律象成斗建故易曰君子居則觀其象而玩其辭動則觀其變而玩其占是故雲龍風雨晝夜變在其中矣白者取象其金西方黑者取象其水北方坎內陽珠其象也從子存其貞至巳也為終而晦生方圓也象之守職而上不在天下不在田寂默相守神氣不散覆壅之者則天地閉塞通流之者則隂陽生成生成之功天下理也乃七變而化九九者乾也隂陽終始究而求其始也從午存其縣至玄而為終貞至是坎君臣各得其位終而復始故曰自强不息謂終則更生四象之說則終於艮始於震保生存性龜蛇龍鶴守元而不散之所致也右授之者戒慎非道不軌之人乾元子三始論終
